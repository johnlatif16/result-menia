<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلاب - لوحة التحكم</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
        th { background: #667eea; color: white; }
        input, select { padding: 8px; border-radius: 8px; border: 1px solid #ccc; width: 80px; text-align: center; }
        .save-btn { background: #48bb78; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .edit-btn { background: #667eea; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin: 2px; }
        .settings-panel { background: #e9ecef; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .settings-panel input { width: 100px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #ddd; border-radius: 10px; cursor: pointer; }
        .tab.active { background: #667eea; color: white; }
        .notify-btn { background: #e53e3e; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📝 إدارة الطلاب والنتائج</h1>
        <div>
            <button class="notify-btn" onclick="openNotifyModal()">🔔 إرسال إشعار</button>
            <button onclick="logout()" style="background:#e53e3e;color:white;border:none;padding:10px 20px;border-radius:8px;margin-right:10px;">🚪 خروج</button>
        </div>
    </div>
    
    <div class="nav-tabs">
        <div class="tab active" onclick="showTab('students')">📚 الطلاب والنتائج</div>
        <div class="tab" onclick="showTab('settings')">⚙️ إعدادات المواد والترم</div>
    </div>
    
    <div id="studentsTab" class="card">
        <h2>📋 قائمة الطلاب</h2>
        <div style="overflow-x: auto;">
            <table id="studentsTable">
                <thead><tr><th>رقم الجلوس</th><th>الاسم</th><th>المدرسة</th><th>المواد</th><th>المجموع</th><th>الإجراءات</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    
    <div id="settingsTab" class="card" style="display:none;">
        <h2>⚙️ إعدادات النظام</h2>
        <div class="settings-panel">
            <h3>الفصل الدراسي</h3>
            <select id="termSelect">
                <option value="first">الأول</option>
                <option value="second">الثاني</option>
            </select>
            <button onclick="saveSettings()" class="save-btn" style="margin-top:10px;">💾 حفظ الإعدادات</button>
        </div>
        <div class="settings-panel">
            <h3>المواد الأساسية (تضاف للمجموع)</h3>
            <div id="mainSubjectsList"></div>
            <button onclick="addSubject('main')">+ إضافة مادة أساسية</button>
        </div>
        <div class="settings-panel">
            <h3>المواد الإضافية (لا تضاف للمجموع)</h3>
            <div id="extraSubjectsList"></div>
            <button onclick="addSubject('extra')">+ إضافة مادة إضافية</button>
        </div>
    </div>
</div>

<!-- مودال الإشعارات -->
<div id="notifyModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:white; padding:30px; border-radius:20px; width:400px;">
        <h3>إرسال إشعار لجميع المستخدمين</h3>
        <input type="text" id="notifyTitle" placeholder="العنوان" style="width:100%; padding:10px; margin:10px 0;">
        <textarea id="notifyBody" placeholder="نص الإشعار" style="width:100%; padding:10px; margin:10px 0;"></textarea>
        <input type="text" id="notifyUrl" placeholder="رابط الصفحة (اختياري)" style="width:100%; padding:10px; margin:10px 0;">
        <button onclick="sendNotification()" class="save-btn">إرسال</button>
        <button onclick="closeNotifyModal()" style="margin-right:10px;">إلغاء</button>
    </div>
</div>

<script>
    let students = [];
    let settings = { mainSubjects: [], extraSubjects: [], term: 'first' };
    let editingSeat = null;
    
    async function loadData() {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login.html'; return; }
        
        const res = await fetch('/api/admin/students', { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        if (data.success) {
            students = data.students;
            settings = data.settings;
            renderStudentsTable();
            renderSettings();
        }
    }
    
    function renderStudentsTable() {
        const tbody = document.querySelector('#studentsTable tbody');
        tbody.innerHTML = '';
        for (const student of students) {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = student.seat_number;
            row.insertCell(1).innerHTML = `<input type="text" value="${student.student_name || ''}" id="name_${student.seat_number}">`;
            row.insertCell(2).innerHTML = `<input type="text" value="${student.school || ''}" id="school_${student.seat_number}">`;
            
            // خلايا المواد
            let subjectsHtml = '<div style="display:flex;flex-wrap:wrap;gap:5px;">';
            for (const sub of settings.mainSubjects) {
                const score = student.scores?.[sub.name] || 0;
                subjectsHtml += `<div><small>${sub.name}</small><input type="number" step="0.5" value="${score}" id="sub_${student.seat_number}_${sub.name}" style="width:60px;"></div>`;
            }
            for (const sub of settings.extraSubjects) {
                const score = student.scores?.[sub.name] || 0;
                subjectsHtml += `<div><small>${sub.name}</small><input type="number" step="0.5" value="${score}" id="sub_${student.seat_number}_${sub.name}" style="width:60px;"></div>`;
            }
            subjectsHtml += '</div>';
            row.insertCell(3).innerHTML = subjectsHtml;
            
            row.insertCell(4).innerHTML = `<span id="total_${student.seat_number}">${student.total_score || 0}</span>`;
            row.insertCell(5).innerHTML = `<button class="edit-btn" onclick="saveStudent('${student.seat_number}')">💾 حفظ</button>`;
        }
    }
    
    async function saveStudent(seatNumber) {
        const token = localStorage.getItem('token');
        const name = document.getElementById(`name_${seatNumber}`).value;
        const school = document.getElementById(`school_${seatNumber}`).value;
        const scores = {};
        let total = 0;
        
        for (const sub of settings.mainSubjects) {
            const val = parseFloat(document.getElementById(`sub_${seatNumber}_${sub.name}`).value) || 0;
            scores[sub.name] = val;
            total += val;
        }
        for (const sub of settings.extraSubjects) {
            const val = parseFloat(document.getElementById(`sub_${seatNumber}_${sub.name}`).value) || 0;
            scores[sub.name] = val;
        }
        
        document.getElementById(`total_${seatNumber}`).textContent = total;
        
        await fetch('/api/admin/update-student', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ seat_number: seatNumber, student_name: name, school, scores, total_score: total })
        });
        alert('تم حفظ التعديلات');
    }
    
    function renderSettings() {
        document.getElementById('termSelect').value = settings.term;
        const mainDiv = document.getElementById('mainSubjectsList');
        mainDiv.innerHTML = '';
        settings.mainSubjects.forEach((sub, i) => {
            mainDiv.innerHTML += `<div style="margin:5px;"><input type="text" value="${sub.name}" id="main_name_${i}" placeholder="اسم المادة"><input type="number" value="${sub.max}" id="main_max_${i}" placeholder="الدرجة الكلية"><button onclick="removeSubject('main', ${i})">❌</button></div>`;
        });
        
        const extraDiv = document.getElementById('extraSubjectsList');
        extraDiv.innerHTML = '';
        settings.extraSubjects.forEach((sub, i) => {
            extraDiv.innerHTML += `<div style="margin:5px;"><input type="text" value="${sub.name}" id="extra_name_${i}"><input type="number" value="${sub.max}" id="extra_max_${i}"><button onclick="removeSubject('extra', ${i})">❌</button></div>`;
        });
    }
    
    function addSubject(type) {
        if (type === 'main') {
            settings.mainSubjects.push({ name: 'مادة جديدة', max: 20 });
        } else {
            settings.extraSubjects.push({ name: 'مادة جديدة', max: 10 });
        }
        renderSettings();
    }
    
    function removeSubject(type, index) {
        if (type === 'main') settings.mainSubjects.splice(index, 1);
        else settings.extraSubjects.splice(index, 1);
        renderSettings();
    }
    
    async function saveSettings() {
        const token = localStorage.getItem('token');
        const term = document.getElementById('termSelect').value;
        const newMainSubjects = [];
        for (let i = 0; i < settings.mainSubjects.length; i++) {
            newMainSubjects.push({
                name: document.getElementById(`main_name_${i}`).value,
                max: parseFloat(document.getElementById(`main_max_${i}`).value)
            });
        }
        const newExtraSubjects = [];
        for (let i = 0; i < settings.extraSubjects.length; i++) {
            newExtraSubjects.push({
                name: document.getElementById(`extra_name_${i}`).value,
                max: parseFloat(document.getElementById(`extra_max_${i}`).value)
            });
        }
        
        await fetch('/api/admin/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ mainSubjects: newMainSubjects, extraSubjects: newExtraSubjects, term })
        });
        alert('تم حفظ الإعدادات');
        loadData();
    }
    
    function showTab(tab) {
        document.getElementById('studentsTab').style.display = tab === 'students' ? 'block' : 'none';
        document.getElementById('settingsTab').style.display = tab === 'settings' ? 'block' : 'none';
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (tab === 'students' && i === 0) || (tab === 'settings' && i === 1));
        });
    }
    
    function openNotifyModal() { document.getElementById('notifyModal').style.display = 'flex'; }
    function closeNotifyModal() { document.getElementById('notifyModal').style.display = 'none'; }
    
    async function sendNotification() {
        const token = localStorage.getItem('token');
        const title = document.getElementById('notifyTitle').value;
        const body = document.getElementById('notifyBody').value;
        const url = document.getElementById('notifyUrl').value;
        
        await fetch('/api/notify-all', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ title, body, url })
        });
        alert('تم إرسال الإشعارات');
        closeNotifyModal();
    }
    
    function logout() { localStorage.removeItem('token'); window.location.href = '/login.html'; }
    
    loadData();
</script>
</body>
</html>
